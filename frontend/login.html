<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Gestão de Pátio Sambaíba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #cc1f1f;
      --accent2: #ef4444;
      --accent3: #10b981;
      --text: #f0f0f0;
      --muted: #666;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Barlow Condensed', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
      padding: 32px 28px 28px;
    }

    /* ── Logo / cabeçalho ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .logo-empresa {
      font-size: 10px; font-weight: 700;
      color: var(--accent); letter-spacing: 3px;
      text-transform: uppercase; font-family: var(--mono);
    }
    .logo-title {
      font-size: 22px; font-weight: 800;
      letter-spacing: 1px; line-height: 1.1;
    }

    /* ── Formulário ── */
    .form-title {
      font-size: 13px; font-weight: 700;
      color: var(--muted); letter-spacing: 2px;
      text-transform: uppercase; font-family: var(--mono);
      margin-bottom: 20px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: var(--muted); letter-spacing: 1.5px;
      text-transform: uppercase; font-family: var(--mono);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .2s;
      letter-spacing: 1px;
    }
    input:focus { border-color: var(--accent); }

    /* ── Botão ── */
    .btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: var(--display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn:hover:not(:disabled) { background: var(--accent2); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Mensagem de erro ── */
    .erro {
      background: rgba(204,31,31,.12);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 12px;
      margin-top: 14px;
      display: none;
    }
    .erro.visivel { display: block; }

    /* ── Mensagem de sucesso ── */
    .sucesso {
      background: rgba(16,185,129,.1);
      border: 1px solid var(--accent3);
      border-radius: 6px;
      color: var(--accent3);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 12px;
      margin-top: 14px;
      display: none;
    }
    .sucesso.visivel { display: block; }

    /* ── Rodapé ── */
    .footer {
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }

    /* ── Formulário de troca de senha ── */
    #tela-troca { display: none; }
    #tela-troca.visivel { display: block; }
    #tela-login { display: block; }
    #tela-login.oculto { display: none; }

    .aviso-troca {
      background: rgba(59,130,246,.1);
      border: 1px solid #3b82f6;
      border-radius: 6px;
      color: #60a5fa;
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 12px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div>
      <div class="logo-empresa">Sambaíba Transportes</div>
      <div class="logo-title">Gestão de Pátio</div>
    </div>
  </div>

  <!-- ── Tela 1: Login ── -->
  <div id="tela-login">
    <div class="form-title">Acesso ao Sistema</div>
    <form id="form-login" autocomplete="off">
      <div class="field">
        <label for="re">RE — Registro de Funcionário</label>
        <input id="re" type="text" placeholder="Ex: 12345" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btn-login">Entrar</button>
      <div class="erro" id="erro-login"></div>
    </form>
  </div>

  <!-- ── Tela 2: Troca de senha (primeiro acesso) ── -->
  <div id="tela-troca">
    <div class="form-title">Primeiro Acesso</div>
    <div class="aviso-troca">
      ⚠️ Por segurança, você precisa criar uma senha pessoal antes de continuar.<br>
      A senha inicial é o seu RE.
    </div>
    <form id="form-troca" autocomplete="off">
      <div class="field">
        <label for="senha-atual">Senha atual (seu RE)</label>
        <input id="senha-atual" type="password" placeholder="••••••" required>
      </div>
      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <input id="nova-senha" type="password" placeholder="mín. 6 caracteres" minlength="6" required>
      </div>
      <div class="field">
        <label for="confirmar-senha">Confirmar nova senha</label>
        <input id="confirmar-senha" type="password" placeholder="repita a nova senha" required>
      </div>
      <button type="submit" class="btn" id="btn-troca">Salvar e Entrar</button>
      <div class="erro" id="erro-troca"></div>
      <div class="sucesso" id="sucesso-troca"></div>
    </form>
  </div>
</div>

<div class="footer">GARAGEM 3 — SISTEMA INTERNO</div>

<script type="module">
  import { API_BASE_URL, TOKEN_KEY, PERFIL_KEY, NOME_KEY, salvarSessao, getToken, apiFetch } from './js/config.js';

  // Se já tem token válido, vai direto para o app
  if (getToken()) {
    window.location.href = '/index.html';
  }

  const formLogin    = document.getElementById('form-login');
  const formTroca    = document.getElementById('form-troca');
  const telaLogin    = document.getElementById('tela-login');
  const telaTroca    = document.getElementById('tela-troca');
  const erroLogin    = document.getElementById('erro-login');
  const erroTroca    = document.getElementById('erro-troca');
  const sucessoTroca = document.getElementById('sucesso-troca');
  const btnLogin     = document.getElementById('btn-login');
  const btnTroca     = document.getElementById('btn-troca');

  function mostrarErro(el, msg) {
    el.textContent = msg;
    el.classList.add('visivel');
  }
  function limparErro(el) { el.classList.remove('visivel'); }

  // ── Login ──
  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    limparErro(erroLogin);
    btnLogin.disabled = true;
    btnLogin.textContent = 'Aguarde...';

    const re    = document.getElementById('re').value.trim();
    const senha = document.getElementById('senha').value;

    try {
      const res = await fetch(`${API_BASE_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ re, senha }),
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail ?? 'Erro ao fazer login');
      }

      const data = await res.json();

      // Busca nome do usuário (para exibir no app)
      const me = await fetch(`${API_BASE_URL}/auth/me`, {
        headers: { 'Authorization': `Bearer ${data.access_token}` },
      });
      const meData = me.ok ? await me.json() : { nome: re };

      salvarSessao(data, meData.nome);
      localStorage.setItem(PERFIL_KEY, meData.perfil ?? '');

      if (data.primeiro_acesso) {
        // Guarda o token temporariamente e abre a tela de troca
        telaLogin.classList.add('oculto');
        telaTroca.classList.add('visivel');
        // Pré-preenche a senha atual com o RE para facilitar
        document.getElementById('senha-atual').value = senha;
      } else {
        window.location.href = '/index.html';
      }

    } catch (err) {
      mostrarErro(erroLogin, err.message);
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
    }
  });

  // ── Troca de senha (primeiro acesso) ──
  formTroca.addEventListener('submit', async (e) => {
    e.preventDefault();
    limparErro(erroTroca);
    sucessoTroca.classList.remove('visivel');

    const senhaAtual     = document.getElementById('senha-atual').value;
    const novaSenha      = document.getElementById('nova-senha').value;
    const confirmarSenha = document.getElementById('confirmar-senha').value;

    if (novaSenha !== confirmarSenha) {
      mostrarErro(erroTroca, 'As senhas não coincidem');
      return;
    }
    if (novaSenha.length < 6) {
      mostrarErro(erroTroca, 'A nova senha precisa ter pelo menos 6 caracteres');
      return;
    }

    btnTroca.disabled = true;
    btnTroca.textContent = 'Salvando...';

    try {
      await apiFetch('/auth/trocar-senha', {
        method: 'POST',
        body: JSON.stringify({ senha_atual: senhaAtual, nova_senha: novaSenha }),
      });

      sucessoTroca.textContent = '✅ Senha alterada! Redirecionando...';
      sucessoTroca.classList.add('visivel');
      setTimeout(() => { window.location.href = '/index.html'; }, 1500);

    } catch (err) {
      mostrarErro(erroTroca, err.message);
      btnTroca.disabled = false;
      btnTroca.textContent = 'Salvar e Entrar';
    }
  });
</script>

</body>
</html>
