<!DOCTYPE html>
<!--
  Sistema de Gestão de Pátio Sambaíba — V3
  Tela de alertas — Fase 5.5 — Presos e Amostrais
  Desenvolvido por Alisson Martins
  © 2026 — Todos os direitos reservados
-->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Alertas — Sambaíba V3</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
    <div class="app-header-brand">
        <img class="app-header-logo" src="assets/img/sambaiba-logo.jpg" alt="Eu amo Sambaíba">
        <div class="app-header-titles">
            <div class="app-header-empresa">Sambaíba</div>
            <div class="app-header-title">GESTÃO DE PÁTIO</div>
        </div>
    </div>

    <div class="app-header-user">
        <div class="app-user-info">
            <div class="app-user-name" id="user-name">—</div>
            <div class="app-user-meta" id="user-meta">—</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">Sair</button>
    </div>
</header>

<!-- Navegação entre telas -->
<nav class="app-nav">
    <a href="patio.html" class="app-nav-link">Pátio</a>
    <a href="remanejamento.html" class="app-nav-link">Remanejamento</a>
    <a href="alertas.html" class="app-nav-link active">Alertas</a>
    <a href="manutencao.html" class="app-nav-link">Manutenção</a>
    <a href="importacao.html" class="app-nav-link">Importação</a>
</nav>

<main class="patio-main">
    <!-- KPIs -->
    <section class="stats-bar" aria-label="Indicadores de alertas">
        <div class="stat-card stat-card-warn">
            <div class="stat-label">Presos</div>
            <div class="stat-value" id="stat-presos">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Amostrais</div>
            <div class="stat-value" id="stat-amostrais">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Resolvidos</div>
            <div class="stat-value" id="stat-resolvidos">0</div>
        </div>
    </section>

    <!-- Filtros + botão novo alerta -->
    <div class="remanejo-filtros">
        <button class="filtro-btn active" data-filtro="ativos">Todos Ativos</button>
        <button class="filtro-btn" data-filtro="preso">PRESO</button>
        <button class="filtro-btn" data-filtro="amostral">AMOSTRAL</button>
        <button class="filtro-btn" data-filtro="resolvidos">Resolvidos</button>
        <button class="btn btn-primary" id="btn-novo-alerta" style="margin-left:auto">+ Novo Alerta</button>
    </div>

    <!-- Lista de alertas -->
    <section id="alerta-lista" aria-live="polite">
        <div class="patio-loading">Carregando alertas…</div>
    </section>
</main>

<!-- Rodapé fixo: status do polling + última atualização -->
<footer class="update-footer">
    <span class="status-dot" id="poll-dot"></span>
    <span id="poll-status">Aguardando…</span>
    <span class="update-sep">·</span>
    <span>Atualizado <span id="poll-time">--:--:--</span></span>
</footer>

<!-- Modal Novo Alerta -->
<div class="modal-overlay" id="modal-novo-alerta">
    <div class="modal">
        <button type="button" class="modal-close" id="modal-fechar">✕</button>
        <div class="modal-title">Novo Alerta</div>

        <!-- Seleção de tipo: PRESO / AMOSTRAL -->
        <div class="tipo-toggle" id="tipo-toggle">
            <button type="button" class="tipo-toggle-btn active" data-tipo="PRESO" id="btn-tipo-preso">PRESO</button>
            <button type="button" class="tipo-toggle-btn" data-tipo="AMOSTRAL" id="btn-tipo-amostral">AMOSTRAL</button>
        </div>

        <div class="form-group">
            <label class="form-label" for="modal-frota">Frota <span style="color:var(--accent)">*</span></label>
            <input type="number" class="form-input" id="modal-frota" placeholder="Ex: 1042" min="1" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="modal-motivo">Motivo (opcional)</label>
            <input type="text" class="form-input" id="modal-motivo" placeholder="Ex: Problema mecânico na linha">
        </div>

        <!-- Erro inline do modal -->
        <div id="modal-erro" style="display:none;color:var(--accent);font-size:0.85rem;margin-bottom:0.75rem;"></div>

        <button type="button" class="btn btn-primary btn-full" id="btn-registrar">Registrar</button>
        <button type="button" class="btn btn-ghost btn-full btn-modal-stack" id="btn-cancelar">Cancelar</button>
    </div>
</div>

<script type="module" src="./assets/js/alertas.js"></script>
</body>
</html>
