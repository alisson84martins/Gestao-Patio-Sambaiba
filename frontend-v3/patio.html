<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Pátio — Sambaíba V3</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
    <div class="app-header-brand">
        <img class="app-header-logo" src="assets/img/sambaiba-logo.jpg" alt="Eu amo Sambaíba">
        <div class="app-header-titles">
            <div class="app-header-empresa">Sambaíba</div>
            <div class="app-header-title">GESTÃO DE PÁTIO</div>
        </div>
    </div>

    <div class="app-header-user">
        <div class="app-user-info">
            <div class="app-user-name" id="user-name">—</div>
            <div class="app-user-meta" id="user-meta">—</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">Sair</button>
    </div>
</header>

<main>
    <div class="placeholder-msg">
        <div class="icon">🚧</div>
        <div class="title">Tela do pátio em construção</div>
        <div class="sub">
            Fase 5.1 — Login concluído.<br>
            Próxima sessão: 5.2 (visualização das filas em tempo real).
        </div>
    </div>
</main>

<script type="module">
    import { requireAuth, getCurrentUser, logout } from './assets/js/auth.js';

    // Proteção de rota — se não tá logado, redireciona pro login
    if (!requireAuth()) {
        // requireAuth já redireciona; nada mais a fazer
    } else {
        const user = getCurrentUser();
        if (user) {
            document.getElementById('user-name').textContent = user.nome || '—';
            document.getElementById('user-meta').textContent =
                `${user.re || ''} · ${user.perfil || ''}`.toUpperCase();
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            logout();
            window.location.replace('index.html');
        });
    }
</script>
</body>
</html>
