<!DOCTYPE html>
<!--
  Sistema de Gestão de Pátio Sambaíba — V3
  Tela do pátio — Fase 5.2 — visualização das filas em tempo real
  Desenvolvido por Alisson Martins
  © 2026 — Todos os direitos reservados
-->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Pátio — Sambaíba V3</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
    <div class="app-header-brand">
        <img class="app-header-logo" src="assets/img/sambaiba-logo.jpg" alt="Eu amo Sambaíba">
        <div class="app-header-titles">
            <div class="app-header-empresa">Sambaíba</div>
            <div class="app-header-title">GESTÃO DE PÁTIO</div>
        </div>
    </div>

    <div class="app-header-user">
        <div class="app-user-info">
            <div class="app-user-name" id="user-name">—</div>
            <div class="app-user-meta" id="user-meta">—</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">Sair</button>
    </div>
</header>

<!-- Navegação entre telas -->
<nav class="app-nav">
    <a href="patio.html" class="app-nav-link active">Pátio</a>
    <a href="remanejamento.html" class="app-nav-link">Remanejamento</a>
    <a href="alertas.html" class="app-nav-link">Alertas</a>
    <a href="manutencao.html" class="app-nav-link">Manutenção</a>
    <a href="importacao.html" class="app-nav-link">Importação</a>
</nav>

<main class="patio-main">
    <!-- Barra de stats: 4 KPIs grandes -->
    <section class="stats-bar" aria-label="Indicadores do pátio">
        <div class="stat-card">
            <div class="stat-label">Frota no pátio</div>
            <div class="stat-value" id="stat-frota">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Alocados</div>
            <div class="stat-value" id="stat-alocados">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Manutenção</div>
            <div class="stat-value" id="stat-manutencao">0</div>
        </div>
        <div class="stat-card stat-card-warn">
            <div class="stat-label">Presos</div>
            <div class="stat-value" id="stat-presos">0</div>
        </div>
    </section>

    <!-- Painel Registrar Filas — modo bloco Fase 5.3 -->
    <div class="alocar-rapido">
        <div class="alocar-rapido-title">Registrar Filas</div>
        <div class="bloco-input-row">
            <input type="number" id="bloco-carro" placeholder="Carro" class="bloco-input bloco-input-carro">
            <input type="text" id="bloco-fila-input" placeholder="Fila ou posição" class="bloco-input bloco-input-fila" autocomplete="off">
            <input type="text" id="bloco-linha" placeholder="Linha" list="lista-linhas-bloco" class="bloco-input bloco-input-linha">
            <datalist id="lista-linhas-bloco"></datalist>
            <button type="button" class="sentido-btn active" id="btn-ida" title="Frente → Fundo">↑</button>
            <button type="button" class="sentido-btn" id="btn-volta" title="Fundo → Frente">↓</button>
            <button type="button" class="btn btn-primary btn-bloco-acao" id="btn-marcar">✔</button>
            <button type="button" class="btn btn-ghost btn-bloco-acao" id="btn-desfazer" title="Desfazer último">↩</button>
        </div>
        <div id="bloco-status" class="bloco-status"></div>
        <div class="bloco-historico" id="bloco-historico"></div>
    </div>

    <!-- Container que será preenchido dinamicamente pelo JS -->
    <section id="patio-grid" class="patio-content" aria-live="polite">
        <div class="patio-loading">Carregando filas…</div>
    </section>
</main>

<!-- Rodapé fixo: status do polling + última atualização -->
<footer class="update-footer">
    <span class="status-dot" id="poll-dot"></span>
    <span id="poll-status">Aguardando…</span>
    <span class="update-sep">·</span>
    <span>Atualizado <span id="poll-time">--:--:--</span></span>
</footer>

<!-- Modal mover/remover ônibus — Fase 5.3 -->
<div class="modal-overlay" id="modal-mover-chip">
    <div class="modal">
        <button type="button" class="modal-close" id="modal-mover-fechar">✕</button>
        <div class="modal-title" id="modal-mover-titulo">Veículo —</div>
        <div class="form-group">
            <label class="form-label" for="mover-nova-posicao">Mover para outra posição (opcional)</label>
            <select class="form-select" id="mover-nova-posicao">
                <option value="">— Manter posição atual —</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label" for="mover-linha">Linha que irá operar</label>
            <input type="text" class="form-input" id="mover-linha" placeholder="Ex: 917H-10" list="lista-linhas-bloco" autocomplete="off">
        </div>
        <button type="button" class="btn btn-primary btn-full" id="btn-mover-salvar">Salvar</button>
        <button type="button" class="btn btn-danger btn-full btn-modal-stack" id="btn-mover-remover">Remover desta posição</button>
        <button type="button" class="btn btn-ghost btn-full btn-modal-stack" id="btn-mover-cancelar">Cancelar</button>
    </div>
</div>

<script type="module" src="./assets/js/patio.page.js"></script>
</body>
</html>
