<!DOCTYPE html>
<!--
  Sistema de Gestão de Pátio Sambaíba — V3
  Tela de manutenção — Fase 5.6 — Fichas de manutenção da frota
  Desenvolvido por Alisson Martins
  © 2026 — Todos os direitos reservados
-->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Manutenção — Sambaíba V3</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
    <div class="app-header-brand">
        <img class="app-header-logo" src="assets/img/sambaiba-logo.jpg" alt="Eu amo Sambaíba">
        <div class="app-header-titles">
            <div class="app-header-empresa">Sambaíba</div>
            <div class="app-header-title">GESTÃO DE PÁTIO</div>
        </div>
    </div>

    <div class="app-header-user">
        <div class="app-user-info">
            <div class="app-user-name" id="user-name">—</div>
            <div class="app-user-meta" id="user-meta">—</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">Sair</button>
    </div>
</header>

<!-- Navegação entre telas -->
<nav class="app-nav">
    <a href="patio.html" class="app-nav-link">Pátio</a>
    <a href="remanejamento.html" class="app-nav-link">Remanejamento</a>
    <a href="alertas.html" class="app-nav-link">Alertas</a>
    <a href="manutencao.html" class="app-nav-link active">Manutenção</a>
    <a href="importacao.html" class="app-nav-link">Importação</a>
</nav>

<main class="patio-main">
    <!-- KPIs: contadores por status -->
    <section class="stats-bar" aria-label="Indicadores de manutenção">
        <div class="stat-card stat-card-warn">
            <div class="stat-label">Abertas</div>
            <div class="stat-value" id="stat-abertas">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Em Andamento</div>
            <div class="stat-value" id="stat-andamento">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Concluídas</div>
            <div class="stat-value" id="stat-concluidas">0</div>
        </div>
    </section>

    <!-- Filtros + botão nova ficha -->
    <div class="remanejo-filtros">
        <button class="filtro-btn active" data-filtro="todas">Todas</button>
        <button class="filtro-btn" data-filtro="aberta">Abertas</button>
        <button class="filtro-btn" data-filtro="em_andamento">Em Andamento</button>
        <button class="filtro-btn" data-filtro="concluida">Concluídas</button>
        <button class="btn btn-primary" id="btn-nova-ficha" style="margin-left:auto">+ Nova Ficha</button>
    </div>

    <!-- Lista de fichas -->
    <section id="manut-lista" aria-live="polite">
        <div class="patio-loading">Carregando fichas…</div>
    </section>
</main>

<!-- Rodapé fixo: status do polling + última atualização -->
<footer class="update-footer">
    <span class="status-dot" id="poll-dot"></span>
    <span id="poll-status">Aguardando…</span>
    <span class="update-sep">·</span>
    <span>Atualizado <span id="poll-time">--:--:--</span></span>
</footer>

<!-- ========================================================= -->
<!-- Modal: Abrir Nova Ficha de Manutenção                      -->
<!-- ========================================================= -->
<div class="modal-overlay" id="modal-nova-ficha">
    <div class="modal">
        <button type="button" class="modal-close" id="modal-nova-fechar">✕</button>
        <div class="modal-title">Nova Ficha de Manutenção</div>

        <div class="form-group">
            <label class="form-label" for="nova-frota">
                Frota <span style="color:var(--accent)">*</span>
            </label>
            <input
                type="number"
                class="form-input"
                id="nova-frota"
                placeholder="Ex: 1042"
                min="1"
                required
            >
        </div>

        <div class="form-group">
            <label class="form-label" for="nova-tipo-defeito">
                Tipo de Defeito <span style="color:var(--accent)">*</span>
            </label>
            <select class="form-select" id="nova-tipo-defeito">
                <option value="">— Selecione o tipo —</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="nova-descricao">Descrição (opcional)</label>
            <textarea
                class="form-textarea"
                id="nova-descricao"
                rows="3"
                placeholder="Descreva o problema observado…"
            ></textarea>
        </div>

        <!-- Área de erro inline — não usar alert() -->
        <div id="modal-nova-erro" style="display:none;color:var(--accent);font-size:0.85rem;margin-bottom:0.75rem;"></div>

        <button type="button" class="btn btn-primary btn-full" id="btn-abrir-ficha">Abrir Ficha</button>
        <button type="button" class="btn btn-ghost btn-full btn-modal-stack" id="btn-nova-cancelar">Cancelar</button>
    </div>
</div>

<!-- ========================================================= -->
<!-- Modal: Atualizar Ficha Existente                           -->
<!-- ========================================================= -->
<div class="modal-overlay" id="modal-atualizar-ficha">
    <div class="modal">
        <button type="button" class="modal-close" id="modal-atualizar-fechar">✕</button>
        <div class="modal-title">Atualizar Ficha</div>

        <!-- Resumo da ficha selecionada -->
        <div id="atualizar-resumo" style="margin-bottom:1rem;font-size:0.9rem;opacity:0.75;line-height:1.5;"></div>

        <div class="form-group">
            <label class="form-label" for="atualizar-status">Novo Status</label>
            <select class="form-select" id="atualizar-status">
                <option value="ABERTA">Aberta</option>
                <option value="EM_ANDAMENTO">Em Andamento</option>
                <option value="CONCLUIDA">Concluída</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="atualizar-descricao">Observação (opcional)</label>
            <textarea
                class="form-textarea"
                id="atualizar-descricao"
                rows="3"
                placeholder="Adicione uma observação sobre o andamento…"
            ></textarea>
        </div>

        <!-- Área de erro inline -->
        <div id="modal-atualizar-erro" style="display:none;color:var(--accent);font-size:0.85rem;margin-bottom:0.75rem;"></div>

        <button type="button" class="btn btn-primary btn-full" id="btn-salvar-atualizacao">Salvar</button>
        <button type="button" class="btn btn-ghost btn-full btn-modal-stack" id="btn-atualizar-cancelar">Cancelar</button>
    </div>
</div>

<script type="module" src="./assets/js/manutencao.js"></script>
</body>
</html>
